name: release

# Triggered manually once pending changesets have been merged to main.
# Runs `changeset version` to consume changesets, derives the tag from
# package.json, syncs the version into build.zig.zon, commits & pushes
# the bump, then builds and publishes the GitHub release.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so changesets can read the log.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply changesets and bump version
        run: pnpm changeset version

      - name: Read version
        id: version
        run: echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Sync version into build.zig.zon
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          sed -i "s/\.version = \"[^\"]*\"/.version = \"$VERSION\"/" build.zig.zon

      - name: Commit and push version bump
        run: |
          git config user.name "cb release bot"
          git config user.email "noreply@github.com"
          git add package.json pnpm-lock.yaml CHANGELOG.md build.zig.zon .changeset
          git commit -m "chore: release ${{ steps.version.outputs.tag }}"
          git push https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git HEAD:main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build binaries and cut release
        env:
          GH_TOKEN: ${{ github.token }}
          # PAT/App token with contents:write on the tap repo; github.token can't push cross-repo.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: bash scripts/release.sh "${{ steps.version.outputs.tag }}"
