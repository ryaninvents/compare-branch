name: release

# Manually triggered: pick a tag, optionally cut a draft first.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build binaries and cut release
        env:
          GH_TOKEN: ${{ github.token }}
          # PAT/App token with contents:write on the tap repo; github.token can't push cross-repo.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: bash scripts/release.sh "${{ inputs.tag }}"
